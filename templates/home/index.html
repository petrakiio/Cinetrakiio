<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineTrakio</title>

    <!-- Estilos -->
     {% load static %}
    <link rel="shortcut icon" href="{% static 'img/Logos/Logo.png' %}" type="image/x-icon">
    <link rel="stylesheet" href="{% static 'CSS/layout.css' %}">
    <link rel="stylesheet" href="{% static 'CSS/banner.css' %}">
    <link rel="stylesheet" href="{% static 'CSS/menu.css' %}">
</head>

<body>
    <!-- Menu de navegação -->
    <header class="topbar-shell">
        <button class="menu-toggle" id="menuToggle" aria-label="Abrir menu" aria-expanded="false" aria-controls="mainMenu">
            <span></span>
            <span></span>
            <span></span>
        </button>

        <div class="tab" id="mainMenu">
            <button class="menu-close" id="menuClose" type="button">Fechar ✕</button>

            <a href="{% url 'login' %}">Login</a>
            <a href="{% url 'sobre' %}">Sobre</a>
            <a href="{% url 'novidades' %}">Novidades</a>

            <button id="modo">Modo Claro</button>
        </div>
    </header>

    <!-- Banner automático -->
    <div class="sliderAutoTrakio" id="banner">
        <img src="{% static 'img/ação/ate o ultimo homem.jpg' %}" class="slide ativo">
        <img src="{% static 'img/comedia/gente grande 2.jpg' %}" class="slide">
        <img src="{% static 'img/animação/os incriveis.jpg' %}" class="slide">
        <img src="{% static 'img/terror/mama.jpg' %}" class="slide">
    </div>

    <!-- Gêneros -->
    <div class="generos">
        
        <a href="{% url 'genero_comedia' %}">Comédia</a>
        <a href="{% url 'genero_acao' %}">Ação</a>
        <a href="{% url 'genero_terror' %}">Terror</a>
        <a href="{% url 'genero_brasileiro' %}">Brasileiro</a>
        <a href="{% url 'genero_romance' %}">Romance</a>
        <a href="{% url 'genero_animacao' %}">Animação</a>
        <a href="{% url 'genero_ficcao' %}">Ficção</a>
    </div>

    <!-- Scripts -->
    <script src="{% static 'script/banner.js' %}"></script>
    <script src="{% static 'script/anim.js' %}"></script>
    <script src="{% static 'script/modo.js' %}"></script>
    <script src="{% static 'script/search_index.js' %}"></script>
    <script src="{% static 'script/topbar.js' %}"></script>
</body>

<footer>
    <a href="{% url 'aviso' %}">Políticas de Privacidade</a>
</footer>

<script src="{% static 'script/social_links.js' %}"></script>
</html>
